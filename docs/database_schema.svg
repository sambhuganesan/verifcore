<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-labelledby="title desc">
  <title id="title">VerifCore database schema example</title>
  <desc id="desc">Four example database tables connected by one-to-many relationship arrows: runs, test cases, and failure signatures point to test results.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .canvas { fill: #f8fafc; }
      .table { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.5; rx: 8; }
      .title-row { fill: #0f172a; }
      .header-row { fill: #e2e8f0; }
      .grid { stroke: #cbd5e1; stroke-width: 1; }
      .title { fill: #ffffff; font: 700 18px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .header { fill: #0f172a; font: 700 13px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .cell { fill: #334155; font: 13px ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; }
      .muted { fill: #64748b; font: 13px ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; }
      .relation { stroke: #334155; stroke-width: 2.25; fill: none; marker-end: url(#arrow); }
      .label { fill: #0f172a; font: 700 14px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .note { fill: #475569; font: 13px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    </style>
  </defs>

  <rect class="canvas" x="0" y="0" width="1400" height="760"/>
  <text x="56" y="50" class="label" style="font-size:24px">VerifCore normalized SQLite schema</text>
  <text x="56" y="76" class="note">Sample rows show how a stable test identity is compared across multiple regression runs.</text>

  <!-- runs -->
  <g transform="translate(56 120)">
    <rect class="table" x="0" y="0" width="500" height="186"/>
    <rect class="title-row" x="0" y="0" width="500" height="42" rx="8"/>
    <text class="title" x="18" y="27">runs</text>
    <rect class="header-row" x="0" y="42" width="500" height="34"/>
    <line class="grid" x1="0" y1="76" x2="500" y2="76"/>
    <line class="grid" x1="0" y1="112" x2="500" y2="112"/>
    <line class="grid" x1="0" y1="148" x2="500" y2="148"/>
    <line class="grid" x1="56" y1="42" x2="56" y2="186"/>
    <line class="grid" x1="158" y1="42" x2="158" y2="186"/>
    <line class="grid" x1="290" y1="42" x2="290" y2="186"/>
    <text class="header" x="18" y="64">id</text>
    <text class="header" x="74" y="64">run_name</text>
    <text class="header" x="176" y="64">commit_hash</text>
    <text class="header" x="308" y="64">created_at</text>
    <text class="cell" x="18" y="99">1</text>
    <text class="cell" x="74" y="99">run_001</text>
    <text class="cell" x="176" y="99">commit_001</text>
    <text class="cell" x="308" y="99">2026-06-21T00:00:00</text>
    <text class="cell" x="18" y="135">2</text>
    <text class="cell" x="74" y="135">run_002</text>
    <text class="cell" x="176" y="135">commit_002</text>
    <text class="cell" x="308" y="135">2026-06-21T00:01:00</text>
    <text class="muted" x="18" y="171">...</text>
    <text class="muted" x="74" y="171">...</text>
    <text class="muted" x="176" y="171">...</text>
    <text class="muted" x="308" y="171">...</text>
  </g>

  <!-- test cases -->
  <g transform="translate(56 420)">
    <rect class="table" x="0" y="0" width="500" height="186"/>
    <rect class="title-row" x="0" y="0" width="500" height="42" rx="8"/>
    <text class="title" x="18" y="27">test_cases</text>
    <rect class="header-row" x="0" y="42" width="500" height="34"/>
    <line class="grid" x1="0" y1="76" x2="500" y2="76"/>
    <line class="grid" x1="0" y1="112" x2="500" y2="112"/>
    <line class="grid" x1="0" y1="148" x2="500" y2="148"/>
    <line class="grid" x1="56" y1="42" x2="56" y2="186"/>
    <line class="grid" x1="180" y1="42" x2="180" y2="186"/>
    <line class="grid" x1="326" y1="42" x2="326" y2="186"/>
    <line class="grid" x1="388" y1="42" x2="388" y2="186"/>
    <text class="header" x="18" y="64">id</text>
    <text class="header" x="74" y="64">suite</text>
    <text class="header" x="198" y="64">test_name</text>
    <text class="header" x="344" y="64">seed</text>
    <text class="header" x="406" y="64">test_family</text>
    <text class="cell" x="18" y="99">42</text>
    <text class="cell" x="74" y="99">dma</text>
    <text class="cell" x="198" y="99">aligned_burst_0</text>
    <text class="cell" x="344" y="99">1000</text>
    <text class="cell" x="406" y="99">aligned_burst</text>
    <text class="cell" x="18" y="135">43</text>
    <text class="cell" x="74" y="135">systolic_array</text>
    <text class="cell" x="198" y="135">backpressure_13</text>
    <text class="cell" x="344" y="135">1013</text>
    <text class="cell" x="406" y="135">backpressure</text>
    <text class="muted" x="18" y="171">...</text>
    <text class="muted" x="74" y="171">...</text>
    <text class="muted" x="198" y="171">...</text>
    <text class="muted" x="344" y="171">...</text>
    <text class="muted" x="406" y="171">...</text>
  </g>

  <!-- test results -->
  <g transform="translate(742 252)">
    <rect class="table" x="0" y="0" width="590" height="222"/>
    <rect class="title-row" x="0" y="0" width="590" height="42" rx="8"/>
    <text class="title" x="18" y="27">test_results</text>
    <rect class="header-row" x="0" y="42" width="590" height="34"/>
    <line class="grid" x1="0" y1="76" x2="590" y2="76"/>
    <line class="grid" x1="0" y1="112" x2="590" y2="112"/>
    <line class="grid" x1="0" y1="148" x2="590" y2="148"/>
    <line class="grid" x1="0" y1="184" x2="590" y2="184"/>
    <line class="grid" x1="46" y1="42" x2="46" y2="222"/>
    <line class="grid" x1="104" y1="42" x2="104" y2="222"/>
    <line class="grid" x1="210" y1="42" x2="210" y2="222"/>
    <line class="grid" x1="306" y1="42" x2="306" y2="222"/>
    <line class="grid" x1="366" y1="42" x2="366" y2="222"/>
    <line class="grid" x1="505" y1="42" x2="505" y2="222"/>
    <text class="header" x="14" y="64">id</text>
    <text class="header" x="58" y="64">run_id</text>
    <text class="header" x="116" y="64">test_case_id</text>
    <text class="header" x="222" y="64">worker</text>
    <text class="header" x="318" y="64">status</text>
    <text class="header" x="378" y="64">failure_sig_id</text>
    <text class="header" x="517" y="64">cycles</text>
    <text class="cell" x="14" y="99">1</text>
    <text class="cell" x="58" y="99">1</text>
    <text class="cell" x="116" y="99">42</text>
    <text class="cell" x="222" y="99">worker-1</text>
    <text class="cell" x="318" y="99">PASS</text>
    <text class="cell" x="378" y="99">none</text>
    <text class="cell" x="517" y="99">684</text>
    <text class="cell" x="14" y="135">2</text>
    <text class="cell" x="58" y="135">2</text>
    <text class="cell" x="116" y="135">42</text>
    <text class="cell" x="222" y="135">worker-3</text>
    <text class="cell" x="318" y="135">FAIL</text>
    <text class="cell" x="378" y="135">7</text>
    <text class="cell" x="517" y="135">915</text>
    <text class="muted" x="14" y="171">...</text>
    <text class="muted" x="58" y="171">...</text>
    <text class="muted" x="116" y="171">...</text>
    <text class="muted" x="222" y="171">...</text>
    <text class="muted" x="318" y="171">...</text>
    <text class="muted" x="378" y="171">...</text>
    <text class="muted" x="517" y="171">...</text>
    <text class="note" x="18" y="207">vcd_path lives here too, e.g. waves/dma_aligned_burst_0_seed1000.vcd</text>
  </g>

  <!-- failure signatures -->
  <g transform="translate(820 558)">
    <rect class="table" x="0" y="0" width="440" height="150"/>
    <rect class="title-row" x="0" y="0" width="440" height="42" rx="8"/>
    <text class="title" x="18" y="27">failure_signatures</text>
    <rect class="header-row" x="0" y="42" width="440" height="34"/>
    <line class="grid" x1="0" y1="76" x2="440" y2="76"/>
    <line class="grid" x1="0" y1="112" x2="440" y2="112"/>
    <line class="grid" x1="54" y1="42" x2="54" y2="150"/>
    <line class="grid" x1="210" y1="42" x2="210" y2="150"/>
    <text class="header" x="18" y="64">id</text>
    <text class="header" x="72" y="64">failure_type</text>
    <text class="header" x="228" y="64">assertion_name</text>
    <text class="cell" x="18" y="99">7</text>
    <text class="cell" x="72" y="99">ASSERTION_FAILED</text>
    <text class="cell" x="228" y="99">valid_ready_protocol</text>
    <text class="cell" x="18" y="135">8</text>
    <text class="cell" x="72" y="135">INFRA_FAILURE</text>
    <text class="cell" x="228" y="135">sim_timeout</text>
  </g>

  <!-- relationships -->
  <path class="relation" d="M 556 212 C 620 212, 650 310, 742 310"/>
  <text class="label" x="575" y="190">1</text>
  <text class="label" x="710" y="298">*</text>
  <text class="note" x="584" y="230">one run has many results</text>

  <path class="relation" d="M 556 512 C 636 512, 664 394, 742 394"/>
  <text class="label" x="575" y="500">1</text>
  <text class="label" x="710" y="408">*</text>
  <text class="note" x="584" y="540">one stable test case appears in many runs</text>

  <path class="relation" d="M 1040 558 C 1040 520, 1040 506, 1040 474"/>
  <text class="label" x="1054" y="548">1</text>
  <text class="label" x="1054" y="494">*</text>
  <text class="note" x="1068" y="526">reused by failed results</text>
</svg>
